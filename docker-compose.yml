services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: plantes
      POSTGRES_USER: plantes
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plantes"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://plantes:${DB_PASSWORD}@db:5432/plantes
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - default
      - caddy_net

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - default
      - caddy_net

networks:
  caddy_net:
    name: caddy_net
    external: true

volumes:
  pgdata:
  uploads:
